<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SUP Tower">
    <title>SUP Tower - Live Conditions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
            color: #ffffff;
            overflow: hidden;
            position: fixed;
        }

        /* Variabili CSS */
        :root {
            --primary: #3498db;
            --accent: #e74c3c;
            --success: #2ecc71;
            --subtle: #1a1a1a;
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.4);
        }

        /* Layout principale */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
        }

        /* Header */
        .header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.7);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-time {
            font-size: 12px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
        }

        /* Video Stream Section */
        .stream-section {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 200px;
            background: var(--subtle);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .stream-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .stream-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
            pointer-events: none;
        }

        .stream-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 24px 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .metric-card:nth-child(1) { animation-delay: 0.5s; }
        .metric-card:nth-child(2) { animation-delay: 0.6s; }
        .metric-card:nth-child(3) { animation-delay: 0.7s; }
        .metric-card:nth-child(4) { animation-delay: 0.8s; }

        .metric-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.05);
        }

        .metric-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .metric-unit {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .metric-trend {
            font-size: 16px;
            margin-left: 4px;
        }

        .metric-trend.up {
            color: var(--accent);
        }

        .metric-trend.down {
            color: var(--success);
        }

        .metric-trend.stable {
            color: var(--text-tertiary);
        }

        /* Wind Direction Section */
        .wind-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s both;
        }

        .wind-title {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .wind-current {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .wind-current-label {
            font-size: 11px;
            color: var(--text-tertiary);
            min-width: 35px;
        }

        .wind-current-direction {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .wind-current-direction.warning {
            color: var(--accent);
            font-weight: 700;
        }

        .wind-trend {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .wind-trend-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .direction-badge {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.3);
            color: var(--primary);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
        }

        .direction-badge.warning {
            background: rgba(231, 76, 60, 0.1);
            border-color: rgba(231, 76, 60, 0.3);
            color: var(--accent);
        }

        .direction-badge:active {
            transform: scale(0.95);
        }

        .wind-trend-separator {
            color: var(--text-tertiary);
            font-weight: 300;
            font-size: 12px;
        }

        /* Status Section */
        .status-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s both;
        }

        .status-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .status-value {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .status-value strong {
            color: #ffffff;
            font-weight: 600;
        }

        /* Loading state */
        .loading {
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Error state */
        .error {
            background: rgba(231, 76, 60, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Footer spacing */
        .content::after {
            content: '';
            display: block;
            height: 20px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 380px) {
            .header-title {
                font-size: 16px;
            }

            .metric-value {
                font-size: 20px;
            }

            .content {
                padding: 16px 12px;
            }

            .metrics-grid {
                gap: 10px;
                margin-bottom: 16px;
            }
        }

        @media (min-width: 768px) {
            .stream-section {
                min-height: 300px;
            }

            .metrics-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }

            .wind-section,
            .status-section {
                margin-bottom: 16px;
            }
        }

        /* iOS Safe Area */
        @supports (padding: max(0px)) {
            .header {
                padding-top: max(12px, env(safe-area-inset-top));
            }

            .content {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-title">SUP Tower</div>
                <div class="header-time" id="headerTime">--:--</div>
            </div>
        </div>

        <div class="stream-section">
            <div class="stream-container">
                <div class="stream-badge">LIVE</div>
                <div class="iframe-wrapper">
                    <iframe
                        src="https://www.youtube-nocookie.com/embed/1A2PUj7SS5o?autoplay=1&controls=1&modestbranding=1&playsinline=1&rel=0&showinfo=0&iv_load_policy=3"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                        loading="lazy"
                        title="SUP Tower Live Stream">
                    </iframe>
                </div>
                <div class="stream-overlay"></div>
            </div>
        </div>

        <div class="content">
            <div class="metrics-grid">
                <div class="metric-card" id="waveCard">
                    <div class="metric-icon">🌊</div>
                    <div class="metric-label">Onde</div>
                    <div class="metric-value">
                        <span id="waveValue">--</span>
                        <span class="metric-unit">cm</span>
                        <span class="metric-trend" id="waveTrend"></span>
                    </div>
                </div>

                <div class="metric-card" id="windCard">
                    <div class="metric-icon">💨</div>
                    <div class="metric-label">Vento</div>
                    <div class="metric-value">
                        <span id="windValue">--</span>
                        <span class="metric-unit">km/h</span>
                        <span class="metric-trend" id="windTrend"></span>
                    </div>
                </div>

                <div class="metric-card" id="airTempCard">
                    <div class="metric-icon">🌡️</div>
                    <div class="metric-label">Aria</div>
                    <div class="metric-value">
                        <span id="airTempValue">--</span>
                        <span class="metric-unit">°C</span>
                    </div>
                </div>

                <div class="metric-card" id="swellCard">
                    <div class="metric-icon">〰️</div>
                    <div class="metric-label">Swell</div>
                    <div class="metric-value">
                        <span id="swellValue">--</span>
                        <span class="metric-unit">cm</span>
                    </div>
                </div>
            </div>

            <div class="wind-section">
                <div class="wind-title">Direzione Vento</div>
                
                <div class="wind-current">
                    <span class="wind-current-label">Ora:</span>
                    <span class="wind-current-direction" id="windCurrentDir">--</span>
                </div>

                <div class="wind-trend">
                    <span class="wind-trend-label">Prossime 4 ore:</span>
                    <div id="windTrendContainer"></div>
                </div>
            </div>

            <div class="status-section" id="statusSection">
                <div class="status-label">Stato Aggiornamento</div>
                <div class="status-value loading" id="statusValue">
                    Caricamento dati in tempo reale...
                </div>
            </div>
        </div>
    </div>

    <script>
        const LATITUDE = 44.1166;
        const LONGITUDE = 12.4862;
        const WEATHER_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current=temperature_2m,wind_speed_10m,wind_direction_10m&hourly=wind_speed_10m,wind_direction_10m,temperature_2m&timezone=Europe/Rome`;
        const MARINE_URL = `https://marine-api.open-meteo.com/v1/marine?latitude=${LATITUDE}&longitude=${LONGITUDE}&hourly=wave_height,swell_wave_height,wave_direction&timezone=Europe/Rome`;

        let lastUpdate = null;
        let weatherData = null;
        let marineData = null;

        // Update header time
        function updateHeaderTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('headerTime').textContent = `${hours}:${minutes}`;
        }

        // Find closest hour index
        function getClosestHourIndex(times) {
            const now = new Date();
            let closestIndex = 0;
            let minDiff = Infinity;
            for (let i = 0; i < times.length; i++) {
                const time = new Date(times[i]);
                const diff = Math.abs(now - time);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestIndex = i;
                }
            }
            return closestIndex;
        }

        // Get wind direction name
        function getWindDirection(deg) {
            if (deg === undefined || deg === null) return "N/D";
            const directions = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSO", "SO", "OSO", "O", "ONO", "NO", "NNO"];
            const index = Math.round(deg / 22.5) % 16;
            return directions[index];
        }

        // Get trend arrow and color
        function getTrend(current, next) {
            if (next > current) return { arrow: "▲", class: "up" };
            if (next < current) return { arrow: "▼", class: "down" };
            return { arrow: "–", class: "stable" };
        }

        // Format wind direction with warning color
        function formatWindDirection(deg) {
            const direction = getWindDirection(deg);
            const isWarning = deg >= 190 && deg <= 350;
            return { direction, isWarning };
        }

        // Fetch data
        async function fetchData() {
            try {
                const [weatherRes, marineRes] = await Promise.all([
                    fetch(WEATHER_URL),
                    fetch(MARINE_URL)
                ]);

                if (!weatherRes.ok || !marineRes.ok) throw new Error('API Error');

                weatherData = await weatherRes.json();
                marineData = await marineRes.json();

                updateUI();
                lastUpdate = new Date();
                updateStatusSection();
            } catch (error) {
                console.error('Errore caricamento dati:', error);
                updateStatusSection(true);
            }
        }

        // Update UI
        function updateUI() {
            if (!weatherData || !marineData) return;

            const closestWeatherIndex = weatherData.hourly?.time ? getClosestHourIndex(weatherData.hourly.time) : 0;
            const closestMarineIndex = marineData.hourly?.time ? getClosestHourIndex(marineData.hourly.time) : 0;

            // Wave data
            if (marineData.hourly?.wave_height) {
                const currentWave = marineData.hourly.wave_height[closestMarineIndex] ?? null;
                const nextWave = marineData.hourly.wave_height[closestMarineIndex + 1] ?? null;

                if (currentWave !== null) {
                    const waveValueEl = document.getElementById('waveValue');
                    const waveTrendEl = document.getElementById('waveTrend');
                    const waveCard = document.getElementById('waveCard');

                    waveValueEl.textContent = Math.round(currentWave * 100);

                    if (nextWave !== null) {
                        const trend = getTrend(currentWave, nextWave);
                        waveTrendEl.textContent = trend.arrow;
                        waveTrendEl.className = `metric-trend ${trend.class}`;
                    }

                    waveCard.classList.remove('loading');
                }
            }

            // Wind speed
            if (weatherData.current?.wind_speed_10m !== undefined && weatherData.hourly?.wind_speed_10m) {
                const currentWind = weatherData.current.wind_speed_10m;
                const nextWind = weatherData.hourly.wind_speed_10m[closestWeatherIndex + 1] ?? null;

                const windValueEl = document.getElementById('windValue');
                const windTrendEl = document.getElementById('windTrend');
                const windCard = document.getElementById('windCard');

                windValueEl.textContent = currentWind.toFixed(1);

                if (nextWind !== null) {
                    const trend = getTrend(currentWind, nextWind);
                    windTrendEl.textContent = trend.arrow;
                    windTrendEl.className = `metric-trend ${trend.class}`;
                }

                windCard.classList.remove('loading');
            }

            // Air temperature
            if (weatherData.current?.temperature_2m !== undefined) {
                const temp = weatherData.current.temperature_2m;
                const airTempCard = document.getElementById('airTempCard');

                document.getElementById('airTempValue').textContent = Math.round(temp);
                airTempCard.classList.remove('loading');
            }

            // Swell
            if (marineData.hourly?.swell_wave_height) {
                const swell = marineData.hourly.swell_wave_height[closestMarineIndex];
                const swellCard = document.getElementById('swellCard');

                document.getElementById('swellValue').textContent = Math.round(swell * 100);
                swellCard.classList.remove('loading');
            }

            // Wind direction
            if (weatherData.current?.wind_direction_10m !== undefined) {
                const windDir = Number(weatherData.current.wind_direction_10m);
                const { direction, isWarning } = formatWindDirection(windDir);
                const windDirEl = document.getElementById('windCurrentDir');

                windDirEl.textContent = direction;
                windDirEl.className = `wind-current-direction ${isWarning ? 'warning' : ''}`;
            }

            // Wind trend (next 4 hours)
            if (weatherData.hourly?.wind_direction_10m) {
                const futureDirs = weatherData.hourly.wind_direction_10m.slice(closestWeatherIndex, closestWeatherIndex + 4);
                const trendContainer = document.getElementById('windTrendContainer');

                trendContainer.innerHTML = futureDirs.map((deg, i) => {
                    const { direction, isWarning } = formatWindDirection(deg);
                    return `
                        <span class="direction-badge ${isWarning ? 'warning' : ''}">${direction}</span>
                        ${i < futureDirs.length - 1 ? '<span class="wind-trend-separator">→</span>' : ''}
                    `;
                }).join('');
            }
        }

        // Update status section
        function updateStatusSection(error = false) {
            const statusValue = document.getElementById('statusValue');

            if (error) {
                statusValue.innerHTML = `<strong>⚠️ Errore di connessione</strong> - Riprovando...`;
                statusValue.className = 'status-value error';
            } else if (lastUpdate) {
                const time = lastUpdate.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                statusValue.innerHTML = `Dati aggiornati alle <strong>${time}</strong>`;
                statusValue.classList.remove('loading');
            }
        }

        // Initialize
        async function init() {
            updateHeaderTime();
            setInterval(updateHeaderTime, 1000);

            await fetchData();
            setInterval(fetchData, 60000); // Update every minute
        }

        init();
    </script>
</body>
</html>
